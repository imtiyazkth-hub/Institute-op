<!DOCTYPE html>
<html>
<head>
  <title>School Management System</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_DOMAIN",
      projectId: "YOUR_PROJECT_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    async function getOne(col, id){
      const ref = doc(db, col, id);
      const snap = await getDoc(ref);
      return snap.exists() ? snap.data() : null;
    }

    window.login = async function(){
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if(!email || !password){
        alert("Enter email & password");
        return;
      }

      try{
        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        const userData = await getOne("users", user.uid);

        if(!userData){
          alert("User data not found!");
          return;
        }

        window.CU = user;
        window.UDATA = userData;
        window.ROLE = userData.role;

        sessionStorage.setItem("uid", user.uid);
        sessionStorage.setItem("role", userData.role);
        sessionStorage.setItem("name", userData.name || "");

        const settings = await getOne("settings", "main");
        window.__opPerms = settings?.operatorDeletePerms || [];

        showApp();

      }catch(e){
        alert("Login Failed: " + e.message);
      }
    }

    function showApp(){
      document.getElementById("loginPage").style.display = "none";
      document.getElementById("app").style.display = "block";

      document.getElementById("welcome").innerText =
        "Welcome " + (window.UDATA?.name || "") + " (" + window.ROLE + ")";
    }

  </script>
</head>

<body>

<div id="loginPage">
  <h2>Login</h2>
  <input id="email" type="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h1 id="welcome"></h1>
  <p>App Loaded Successfully ✅</p>
</div>

</body>
</html>
